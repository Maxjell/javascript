<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agape</title>
    <link rel="stylesheet" href="date.css">
</head>
<body>
    <h1>Agape Registration Form</h1>
    <hr> <br>
    <div class="app">
    <form class="reg">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="date">Date of Birth:</label>
        <input type="date" id="date" name="date" required><br><br>
         <label for="pass">Password:</label>
        <input type="password" id="pass" name="password" placeholder="Enter your password" required><br><br>
        <input type="submit" value="Register" id="registerBtn"><br>
        </form>
        </div>
        <div class="box">
            <div id="nam">Name:</div><br>
            <div id="ema">Email:</div><br>
            <div id="dat">Date of Birth:</div>
        </div>
</body>
<script src="date.js"></script>
</html>
